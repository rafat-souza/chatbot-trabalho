<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bob</title>
</head>
<body>

    <div class="titulo">
        <h1>Bob o Bot</h1>
    </div>

    <div class="main-container">
        <div class="caixa-resposta">
            <p id="resposta">Envie sua duvida...</p>
        </div>

        <div class="caixa-pergunta">
            <input type="text" id="pergunta" placeholder="Digite sua mensagem..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()" class="botao">Enviar</button>
        </div>
    </div>

    <script>
        async function enviarMensagem() {
            const inputMensagem = document.getElementById("pergunta");
            const mensagem = inputMensagem.value;
            const elementoResposta = document.getElementById("resposta");

            if (!mensagem) return;

            elementoResposta.innerText = "Pensando...";

            try {
                const resposta = await fetch("http://127.0.0.1:5000/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ mensagem: mensagem })
                });

                const dados = await resposta.json();
                elementoResposta.innerText = dados.resposta;
                inputMensagem.value = "";

            } catch (error) {
                elementoResposta.innerText = "Ligar o servidor";
                console.error("Erro:", error);
            }
        }
    </script>

</body>
</html>
